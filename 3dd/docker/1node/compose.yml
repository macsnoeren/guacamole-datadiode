name: 3dd-1node

include:
  - ../include/gmwebserver/compose.yml
  - ../include/gmlbroker/compose.yml
  - ../include/guard/compose.yml
  - ../include/approver/compose.yml
  - ../include/hrx_proxy/compose.yml
  - ../include/gcdbroker/compose.yml
  - ../include/guacd/compose.yml
  - ../include/lrx_proxy/compose.yml
  - ../include/sshd/compose.yml
  - ../include/nettest/compose.yml

services:
  gmlbroker:
    command:
      [
        "./build/gmlbroker",
        "gmlbroker", "4823",
        "5504",
        "guard", "5500"
      ]

  guard:
    command:
      [
        "./build/guard",
        "5500",
        "hrx_proxy", "5501"
      ]

  hrx_proxy:
    command:
      [
        "./build/hrx_proxy",
        "5501",
        "gcdbroker", "5502"
      ]

  gcdbroker:
    command:
      [
        "./build/gcdbroker",
        "guacd", "4822",
        "5502",
        "lrx_proxy", "5503"
      ]

  lrx_proxy:
    command:
      [
        "./build/lrx_proxy",
        "5503",
        "gmlbroker", "5504"
      ]

  nettest:
    # Bind-mount the in-container report dir to a host folder alongside this
    # compose file, so the per-run Markdown reports show up at
    # docker/1node/nettest-reports/ and can be opened directly.
    volumes:
      - ./nettest-reports:/var/log/nettest
