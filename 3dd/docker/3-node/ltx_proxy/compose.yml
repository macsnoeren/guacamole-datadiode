include:
  - ../gmwebserver/compose.yml
services:
  gmlbroker:
    build:
      context: ../../../
      dockerfile: docker/3-node/ltx_proxy/Dockerfile
    stop_grace_period: 1s
    container_name: gmlbroker
    restart: unless-stopped
    network_mode: "host"
    command:
      [
        "./build/gmlbroker",
        "0.0.0.0", "4823",
        "10.0.2.2", "5502",
        "10.0.0.2", "5500"
      ]
