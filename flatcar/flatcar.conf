# flatcar.conf
#
# Gedeelde (top-level) configuratie voor create-flatcar-files.sh.
# Dit bestand bevat ALLEEN instellingen die voor alle nodes gelden.
# Per-node configuratie (hostname, install device, netwerk, docker images,
# services) staat in nodes/<naam>/node.conf.
#
# Dit bestand wordt door het script ingelezen (bash source).

# ------------------------------------------------------------
# Flatcar image instellingen (gedeeld over alle nodes)
# ------------------------------------------------------------

# Flatcar release channel: stable, beta, alpha
FLATCAR_CHANNEL="stable"

# Flatcar versie: "current" voor laatste, of expliciet bv. "4152.2.0"
FLATCAR_VERSION="current"

# Architectuur: amd64-usr of arm64-usr
FLATCAR_ARCH="amd64-usr"

# ------------------------------------------------------------
# SSH (gedeeld over alle nodes)
# ------------------------------------------------------------

# Pad naar de SSH public key (wordt in authorized_keys gezet voor user 'core')
SSH_KEY_FILE="./id_ed25519.pub"

# ------------------------------------------------------------
# Nodes
# ------------------------------------------------------------
#
# Elke naam in NODES moet een directory zijn onder NODE_CONFIG_DIR met
# daarin een node.conf bestand. De naam wordt ook gebruikt als hostname
# van de Flatcar machine (kan in node.conf met HOSTNAME overschreven worden).

NODES=(
  "guard-proxy"
  "low-side-tx-proxy"
  "low-side-rx-proxy"
  "high-side-tx-proxy"
  "high-side-rx-proxy"
)

# Directory waarin de per-node configuraties staan (relatief aan dit bestand)
NODE_CONFIG_DIR="./nodes"

# ------------------------------------------------------------
# Output
# ------------------------------------------------------------

# Build directory (relatief aan dit bestand)
BUILD_DIR="./build"

# Cache directory voor gedownloade Flatcar artifacts (relatief aan dit bestand)
CACHE_DIR="./.cache"
