# flatcar.conf
#
# Configuratie voor create-flatcar-files.sh.
# Dit bestand wordt door het script ingelezen (bash source).
# Pas waardes aan voor jouw doelsysteem.

# ------------------------------------------------------------
# Basis systeem instellingen
# ------------------------------------------------------------

# Hostname die de Flatcar machine krijgt
HOSTNAME="flatcar-node"

# Pad naar de SSH public key (wordt in authorized_keys gezet voor user 'core')
SSH_KEY_FILE="./id_ed25519.pub"

# Doel installatie device op de bare-metal machine
# Gebruik /dev/sda voor SATA, /dev/nvme0n1 voor NVMe
INSTALL_DEVICE="/dev/nvme0n1"

# ------------------------------------------------------------
# Flatcar image instellingen
# ------------------------------------------------------------

# Flatcar release channel: stable, beta, alpha
FLATCAR_CHANNEL="stable"

# Flatcar versie: "current" voor laatste, of expliciet bv. "4152.2.0"
FLATCAR_VERSION="current"

# Architectuur: amd64-usr of arm64-usr
FLATCAR_ARCH="amd64-usr"

# ------------------------------------------------------------
# Docker images om te BOUWEN vanuit lokale Dockerfiles
#
# Format per regel: "naam:tag|relatief/pad/naar/build-context"
# Het build-context pad is relatief t.o.v. dit configbestand.
# ------------------------------------------------------------

DOCKER_BUILD_IMAGES=(
  "flatcar-test-web:1.0|./docker-test-image"
)

# ------------------------------------------------------------
# Docker images om te PULLEN vanaf een registry
#
# Format per regel: "naam:tag"
# Worden na pull als tar opgeslagen.
# ------------------------------------------------------------

DOCKER_PULL_IMAGES=(
  # "nginx:latest"
  # "postgres:16"
)

# ------------------------------------------------------------
# Services die als systemd unit moeten draaien op Flatcar
#
# Format per regel: "service_naam|image:tag|docker run argumenten"
# - service_naam wordt /etc/systemd/system/<naam>.service
# - docker run argumenten worden letterlijk doorgegeven aan
#   `docker run --name <service_naam> <args> <image:tag>`
# ------------------------------------------------------------

SERVICES=(
  "flatcar-test|flatcar-test-web:1.0|-p 80:80 -v /var/log/app:/logs"
)

# ------------------------------------------------------------
# Output
# ------------------------------------------------------------

# Build directory (relatief aan dit configbestand)
BUILD_DIR="./build"

# Cache directory voor gedownloade Flatcar artifacts (relatief aan dit configbestand)
# Zo hoeft de Flatcar image niet elke build opnieuw gedownload.
CACHE_DIR="./.cache"
