# nodes/agent/node.conf
#
# Node-specifieke configuratie voor de 'agent' node.
# Wordt gesourced door create-flatcar-files.sh nadat de gedeelde
# flatcar/flatcar.conf is geladen.
#
# HOSTNAME wordt automatisch op de directory-naam (agent) gezet.
# Override expliciet als je iets anders wilt:
#   HOSTNAME="agent.local"

# ------------------------------------------------------------
# Doel installatie device op de bare-metal machine
# Gebruik /dev/sda voor SATA, /dev/nvme0n1 voor NVMe
# ------------------------------------------------------------
INSTALL_DEVICE="/dev/nvme0n1"

# ------------------------------------------------------------
# Netwerk interfaces
#
# Format per regel:
#   "naam|dhcp"
#   "naam|static|adres/cidr|gateway|dns1 dns2 ..."
#
# Per interface wordt /etc/systemd/network/<nn>-<naam>.network gegenereerd.
# Tip: kijk met `ip link` op de doelmachine welke interface-namen er zijn.
# - enp88s0 => HIGH-SIDE-RX-PROXY
# - enp89s0 => LOW-SIDE-TX-PROXY
# ------------------------------------------------------------
NETWORK_INTERFACES=(
  "enp88s0|static|10.10.20.1/24||"
  "enp89s0|static|10.10.30.2/24||"
)

# ------------------------------------------------------------
# Lokaal te bouwen docker images
#
# Format per regel: "naam:tag|relatief/pad/naar/build-context"
# Paden zijn relatief t.o.v. flatcar/flatcar.conf (de top-level config).
# ------------------------------------------------------------
DOCKER_BUILD_IMAGES=(
  "flatcar-webserver-test:1.0|../docker/flatcar-webserver-test"
  "node-logging-proxy:latest|../docker/node-logging-proxy"
)

# ------------------------------------------------------------
# Te pullen docker images van een registry
# Format per regel: "naam:tag"
# ------------------------------------------------------------
DOCKER_PULL_IMAGES=()

# ------------------------------------------------------------
# Systemd services die op deze node moeten draaien
#
# Format per regel: "service_naam|image:tag|docker run argumenten"
# ------------------------------------------------------------
# node-logging-proxy: luistert op 127.0.0.1:1111 voor logs van het eigen
# systeem en stuurt elk datagram door naar de volgende node in de log-keten.
# --network host is nodig zodat BIND=127.0.0.1 de host-loopback is en lokale
# processen ernaar kunnen sturen.
#
# PAS FORWARD_HOST aan naar het IP van de volgende node in de keten.
# Voorbeeld hieronder stuurt naar high-side-rx-proxy (10.10.20.2).
SERVICES=(
  "flatcar-webserver-test|flatcar-webserver-test:1.0|-p 80:80 -v /var/log/app:/logs"
  "node-logging-proxy|node-logging-proxy:latest|--network host -e BIND=10.10.30.2 -e PORT=1111 -e FORWARD_HOST=10.10.20.2 -e FORWARD_PORT=1111 -e HEARTBEAT_INTERVAL=10 -e LOG_FILE=/logs/nodes.log -v /var/log/app:/logs"
)
