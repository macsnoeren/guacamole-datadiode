# nodes/proxy-plant-rx/node.conf
#
# Node-specifieke configuratie voor de 'proxy-plant-rx' node.
# Wordt gesourced door create-flatcar-files.sh nadat de gedeelde
# flatcar/flatcar.conf is geladen.

# ------------------------------------------------------------
# Doel installatie device op de bare-metal machine
# ------------------------------------------------------------
INSTALL_DEVICE="/dev/nvme0n1"

# ------------------------------------------------------------
# Netwerk interfaces — pas aan naar de werkelijke hardware
# - enp88s0 => GUARD
# - enp89s0 => PLANT
# ------------------------------------------------------------
NETWORK_INTERFACES=(
  "enp88s0|static|10.10.20.2/24||"
  "enp89s0|static|192.168.200.10/24||"
)

# ------------------------------------------------------------
# Lokaal te bouwen docker images
# Format: "naam:tag|relatief/pad/naar/build-context"
# ------------------------------------------------------------
DOCKER_BUILD_IMAGES=(
  "flatcar-webserver-test:1.0|../docker/flatcar-webserver-test"
  "node-logging-proxy:latest|../docker/node-logging-proxy"
  "update-node-proxy:latest|../docker/update-node-proxy"
)

# ------------------------------------------------------------
# Te pullen docker images
# ------------------------------------------------------------
DOCKER_PULL_IMAGES=(
  # "macsnoeren/gmdatadiode-gmproxyin:latest"
)

# ------------------------------------------------------------
# Systemd services
# Format: "service_naam|image:tag|docker run argumenten"
#
# node-logging-proxy: ontvangt UDP-logs van andere nodes op poort 1111 en
# toont ze in een webview op http://<node-ip>:8080/. Geen forwarding -
# deze node is het eindpunt van de log-keten voor de high-side.
# Webview draait op 8080 omdat flatcar-webserver-test al op poort 80 luistert.
#
# update-node-proxy (receiver): ontvangt UDP-chunks van guard-proxy op
# poort 40000, reassembleert grote update-bestanden, verifieert SHA-256
# en deponeert ze in /var/lib/update-proxy/inbox op de host (samen met
# <naam>.sha256 en <naam>.done sidecars). Web-UI op http://<node-ip>:8081/
# (8080 is in gebruik door de logging-proxy).
# ------------------------------------------------------------
SERVICES=(
  "flatcar-webserver-test|flatcar-webserver-test:1.0|-p 80:80 -v /var/log/app:/logs"
  "node-logging-proxy|node-logging-proxy:latest|-p 1111:1111/udp -p 8080:80 -e WEB=true -e BIND=10.10.20.2 -e PORT=1111 -e LOG_FILE=/logs/nodes.log -v /var/log/app:/logs"
  "update-node-proxy|update-node-proxy:latest|--network host -e MODE=receiver -e WEB_PORT=8081 -e BIND=10.10.20.2 -e PORT=40000 -v /var/lib/update-proxy:/var/lib/update-proxy"
)
