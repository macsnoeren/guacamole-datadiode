# nodes/proxy-stpa-tx/node.conf
#
# Node-specifieke configuratie voor de 'proxy-stpa-tx' node.
# Wordt gesourced door create-flatcar-files.sh nadat de gedeelde
# flatcar/flatcar.conf is geladen.

# ------------------------------------------------------------
# Doel installatie device op de bare-metal machine
# ------------------------------------------------------------
INSTALL_DEVICE="/dev/nvme0n1"

# ------------------------------------------------------------
# Netwerk interfaces — pas aan naar de werkelijke hardware
# - enp88s0 => GUARD
# - enp89s0 => STPA
# ------------------------------------------------------------
NETWORK_INTERFACES=(
  "enp89s0|static|192.168.100.20/24||"
  "enp88s0|static|10.10.30.1/24||"
)

# ------------------------------------------------------------
# Lokaal te bouwen docker images
# Format: "naam:tag|relatief/pad/naar/build-context"
# ------------------------------------------------------------
DOCKER_BUILD_IMAGES=(
  "flatcar-webserver-test:1.0|../docker/flatcar-webserver-test"
  "node-logging-proxy:latest|../docker/node-logging-proxy"
  "update-node-proxy:latest|../docker/update-node-proxy"
)

# ------------------------------------------------------------
# Te pullen docker images
# ------------------------------------------------------------
DOCKER_PULL_IMAGES=(
)

# ------------------------------------------------------------
# Systemd services
# Format: "service_naam|image:tag|docker run argumenten"
#
# node-logging-proxy: luistert op 127.0.0.1:1111 voor logs van het eigen
# systeem en stuurt elk datagram door naar de volgende node in de log-keten.
# --network host is nodig zodat BIND=127.0.0.1 de host-loopback is en lokale
# processen ernaar kunnen sturen.
#
# PAS FORWARD_HOST aan naar het IP van de volgende node in de keten.
# Voorbeeld hieronder stuurt naar guard-proxy (10.10.30.2) via een
# tussenliggend transport - vul hier het juiste IP van jouw keten in.
#
# update-node-proxy (sender): accepteert HTTP file-uploads op STPA-interface
# (192.168.100.20:9080) en chunkt ze over UDP/40000 door naar guard-proxy
# (10.10.30.2). Web UI op http://192.168.100.20:9080/ toont de queue.
# --network host zodat de UDP source-IP de 10.10.30.1 interface is en de
# upload-endpoint op de STPA-interface bereikbaar is.
# ------------------------------------------------------------
SERVICES=(
  "flatcar-webserver-test|flatcar-webserver-test:1.0|-p 80:80 -v /var/log/app:/logs"
  "node-logging-proxy|node-logging-proxy:latest|-p 127.0.0.1:1111:1111/udp -e PORT=1111 -e FORWARD_HOST=10.10.30.2 -e FORWARD_PORT=1111 -e HEARTBEAT_INTERVAL=10 -e LOG_FILE=/logs/nodes.log -v /var/log/app:/logs"
  "update-node-proxy|update-node-proxy:latest|--network host -e MODE=sender -e WEB_PORT=9080 -e DD_HOST=10.10.30.2 -e DD_PORT=40000 -v /var/lib/update-proxy:/var/lib/update-proxy"
)
