# Builds and unit-tests the C++ proxies (gcdbroker, gmguard, gmlbroker) with
# meson, and sanity-checks the nettest Python sources. The name of this
# workflow ("build") is what the docker-publish workflow waits on via
# workflow_run, so keep it in sync if you rename it.
name: build

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  proxies:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project: [gcdbroker, gmguard, gmlbroker]

    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential meson ninja-build libssl-dev

      - name: Build ${{ matrix.project }}
        working-directory: proxies/${{ matrix.project }}
        run: meson setup build && meson compile -C build

      - name: Test ${{ matrix.project }}
        working-directory: proxies/${{ matrix.project }}
        run: meson test -C build --print-errorlogs

  nettest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Byte-compile nettest sources
        working-directory: proxies/nettest
        run: python -m compileall -q .
