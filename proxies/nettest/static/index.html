<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3DD nettest</title>
<style>
  :root {
    --bg: #f6f7f9; --panel: #fff; --border: #e3e4e8; --muted: #6b7280;
    --accent: #2563eb; --ink: #1f2937;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font-family: system-ui, sans-serif; line-height: 1.4; }

  /* sticky top bar: title + run state, always visible */
  header { position: sticky; top: 0; z-index: 5; background: #fff;
           border-bottom: 1px solid var(--border); }
  .bar { max-width: 64rem; margin: 0 auto; padding: .7rem 1.5rem;
         display: flex; align-items: center; gap: .8rem; }
  .bar h1 { flex: 1; font-size: 1.05rem; margin: 0; }
  #status { padding: .25rem .7rem; border-radius: 999px;
            font-weight: 600; font-size: .82rem; }

  .wrap { max-width: 64rem; margin: 0 auto; padding: 1.2rem 1.5rem 3rem; }

  /* panels */
  .panel { background: var(--panel); border: 1px solid var(--border);
           border-radius: .6rem; padding: 1rem 1.2rem; margin-bottom: 1.1rem; }
  .panel > h2 { font-size: .95rem; margin: 0 0 .15rem; }
  .panel > .hint { color: var(--muted); font-size: .8rem; margin: 0 0 .85rem; }

  /* buttons */
  button { font: inherit; font-size: .9rem; padding: .4rem .9rem;
           border: 1px solid var(--border); border-radius: .4rem;
           background: #fff; cursor: pointer; }
  button:hover { background: #f0f1f4; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { filter: brightness(1.07); }
  button.danger { border-color: #dc2626; color: #991b1b; }
  button.danger:hover { background: #fdeaea; }

  .row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }

  /* test parameters */
  .params { display: grid; gap: .85rem 1.2rem;
            grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
            margin-bottom: .9rem; }
  .field { display: flex; flex-direction: column; gap: .3rem; cursor: help; }
  .field > span { font-size: .78rem; color: var(--muted); }
  .field input[type=number], .field select { padding: .35rem; font: inherit;
            border: 1px solid var(--border); border-radius: .35rem; }
  .field.check { flex-direction: row; align-items: center; gap: .45rem;
                 align-self: end; cursor: pointer; }
  .field.check > span { font-size: .85rem; color: var(--ink); }
  .range { display: flex; align-items: center; gap: .5rem; }
  .range input { flex: 1; }
  #c-err { color: #b91c1c; font-weight: 600; font-size: .85rem; }

  /* quick one-click flows, separated from the custom form */
  .quick { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
           margin-top: 1rem; padding-top: .9rem; border-top: 1px solid var(--border); }
  .quick .lbl { font-size: .8rem; color: var(--muted); }

  /* run-state colours (shared by the status badge) */
  .idle { background: #eee; } .running { background: #cce5ff; }
  .passed { background: #d4edda; } .failed, .error { background: #f8d7da; }
  .stopped { background: #fff3cd; }

  /* live statistics */
  #live { display: grid; gap: .7rem;
          grid-template-columns: repeat(auto-fit, minmax(10.5rem, 1fr)); }
  .card { background: #f7f8fa; border: 1px solid var(--border);
          border-radius: .5rem; padding: .6rem .8rem; }
  .card h3 { font-size: .7rem; margin: 0 0 .35rem; color: var(--muted);
             text-transform: uppercase; letter-spacing: .04em; }
  .card .v { font-size: .88rem; line-height: 1.55; }
  .num { font-variant-numeric: tabular-nums; font-weight: 600; }

  /* log */
  #reports { color: var(--muted); font-size: .8rem; margin: 0 0 .7rem; }
  #reports code { background: #eee; padding: .05rem .3rem; border-radius: .25rem; }
  #log { background: #1e1e1e; color: #d4d4d4; padding: .9rem; border-radius: .5rem;
         min-height: 14rem; max-height: 46vh; overflow-y: auto; white-space: pre-wrap;
         font-family: ui-monospace, monospace; font-size: .82rem; }
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>3DD nettest</h1>
    <span id="status" class="idle">idle</span>
    <button id="stop">Stop test</button>
  </div>
</header>

<div class="wrap">

  <section class="panel">
    <h2>Run a test</h2>
    <p class="hint">Drive a mix of good and bad connections and watch them live.</p>
    <div class="params">
      <label class="field" title="Valid connections that ping-pong: send a probe and time the response. 0–65535.">
        <span>Good connections</span>
        <input id="c-good" type="number" min="0" max="65535" value="5">
      </label>
      <label class="field" title="Connections that establish, then send a corrupt packet so the guard shuts them down. Tests real dangerous commands (sending raw SSH, command for opening a reverse shell, and making an HTTP call) to show that these are blocked (they are not valid Guacamole). The good connections should keep working. 0–65535.">
        <span>Bad connections</span>
        <input id="c-bad" type="number" min="0" max="65535" value="2">
      </label>
      <label class="field" title="What each good connection sends to measure the round-trip. 'key' presses ENTER and times guacd's terminal repaint (realistic, heavy return load). 'argv' opens an argv stream and times guacd's tiny ack (light, single-frame).">
        <span>Probe</span>
        <select id="c-probe">
          <option value="key">key &rarr; paint</option>
          <option value="argv">argv &rarr; ack</option>
        </select>
      </label>
      <label class="field" title="Seconds each connection waits between sends. 0 = as fast as possible.">
        <span>Send delay (s) — <output id="c-delay-val">0.5</output></span>
        <div class="range"><input id="c-delay" type="range" min="0" max="10" step="0.1" value="0.5"></div>
      </label>
      <label class="field" title="How long the test runs, in seconds.">
        <span>Duration (s)</span>
        <input id="c-dur" type="number" min="1" max="3600" value="15">
      </label>
      <label class="field check" title="Stagger each connection's start by a small random offset instead of all sending in lockstep.">
        <input id="c-rand" type="checkbox" checked>
        <span>Randomize send offsets</span>
      </label>
    </div>
    <div class="row">
      <button id="c-run" class="primary">Run test</button>
      <span id="c-err"></span>
    </div>
    <div class="quick">
      <span class="lbl">Quick flows:</span>
      <span id="tests"></span>
    </div>
  </section>

  <section class="panel">
    <h2>Live statistics</h2>
    <div id="live"></div>
  </section>

  <section class="panel">
    <h2>Log</h2>
    <div class="row" style="margin-bottom:.7rem">
      <p id="reports" style="margin:0; flex:1">Reports are saved when each test ends or is stopped.</p>
      <button id="clear-reports" class="danger">Clear reports</button>
    </div>
    <pre id="log"></pre>
  </section>

</div>
<script>
let cursor = 0;
const $ = (id) => document.getElementById(id);

async function loadTests() {
  const r = await fetch("/api/tests");
  const { tests } = await r.json();
  const span = $("tests");
  for (const name of tests) {
    if (name === "custom") continue;  // custom has its own parameter panel
    const b = document.createElement("button");
    b.textContent = "Run " + name;
    b.onclick = () => { clearLog(); fetch("/api/start?test=" + name, { method: "POST" }); };
    span.appendChild(b);
  }
}

function clearLog() { $("log").textContent = ""; cursor = 0; }

// --- custom parameter panel ---
$("c-delay").oninput = () => { $("c-delay-val").textContent = $("c-delay").value; };

function customValid() {
  const good = parseInt($("c-good").value || "0", 10);
  const bad = parseInt($("c-bad").value || "0", 10);
  const err = $("c-err");
  if (good + bad > 65535) {
    err.textContent = `good + bad = ${good + bad} exceeds the 65535-channel limit`;
    $("c-run").disabled = true;
    return false;
  }
  if (good + bad === 0) {
    err.textContent = "set at least one good or bad connection";
    $("c-run").disabled = true;
    return false;
  }
  err.textContent = "";
  $("c-run").disabled = false;
  return true;
}
["c-good", "c-bad"].forEach((id) => { $(id).oninput = customValid; });

$("c-run").onclick = () => {
  if (!customValid()) return;
  clearLog();
  fetch("/api/start?test=custom", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      good: parseInt($("c-good").value || "0", 10),
      bad: parseInt($("c-bad").value || "0", 10),
      probe: $("c-probe").value,
      delay: parseFloat($("c-delay").value),
      randomize: $("c-rand").checked,
      duration: parseInt($("c-dur").value || "0", 10),
    }),
  });
};

$("stop").onclick = () => fetch("/api/stop", { method: "POST" });

$("clear-reports").onclick = async () => {
  if (!confirm("Delete ALL saved nettest reports? This cannot be undone.")) return;
  const btn = $("clear-reports");
  btn.disabled = true;
  try {
    const r = await fetch("/api/reports/clear", { method: "POST" });
    const data = await r.json();
    if (!r.ok) throw new Error((data.errors || [data.error]).join("; "));
    $("reports").textContent = `Cleared ${data.deleted} report(s).`;
  } catch (e) {
    $("reports").textContent = "Clear failed: " + e.message;
  } finally {
    btn.disabled = false;
  }
};

// --- live stats rendering ---
function card(title, rows) {
  const lines = rows.map(([k, v]) => `${k}: <span class="num">${v}</span>`).join("<br>");
  return `<div class="card"><h3>${title}</h3><div class="v">${lines}</div></div>`;
}

function renderLive(live) {
  const el = $("live");
  if (!live) { el.innerHTML = '<div class="card"><div class="v">no run yet</div></div>'; return; }
  const g = live.good, b = live.bad, l = live.latency_ms;
  const lat = l
    ? [["n", l.count], ["mean", l.mean_ms + " ms"], ["min", l.min_ms + " ms"],
       ["max", l.max_ms + " ms"], ["stddev", l.stddev_ms + " ms"]]
    : [["samples", "none yet"]];
  el.innerHTML =
    card("Connections", [["open", live.open_connections], ["peak", live.peak_open]]) +
    card("Good", [["total", g.total], ["established", g.established],
                  ["disconnected", g.disconnected], ["timeouts", g.timeouts]]) +
    card("Bad", [["total", b.total], ["established", b.established],
                 ["corrupted", b.corrupted], ["shut down", b.shutdown_observed],
                 ["dropped early", b.disconnected]]) +
    card("Latency", lat);
}

function renderReports(st) {
  const el = $("reports");
  if (!st.report_dir) return;
  let html = `Reports are saved in the nettest container at <code>${st.report_dir}</code>`;
  if (st.report) html += ` — latest: <code>${st.report.split("/").pop()}</code>`;
  el.innerHTML = html;
}

async function poll() {
  try {
    const st = await (await fetch("/api/status")).json();
    const badge = $("status");
    badge.textContent = st.state + (st.test ? " (" + st.test + ")" : "");
    badge.className = st.state;
    renderLive(st.live);
    renderReports(st);

    const lg = await (await fetch("/api/log?since=" + cursor)).json();
    cursor = lg.next;
    if (lg.lines.length) {
      const el = $("log");
      el.textContent += lg.lines.join("\n") + "\n";
      el.scrollTop = el.scrollHeight;
    }
  } catch (e) { /* server restarting; keep polling */ }
}

loadTests();
customValid();
renderLive(null);
setInterval(poll, 500);
</script>
</body>
</html>
