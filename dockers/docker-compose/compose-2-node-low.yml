# ================================================================================
# compose-2-node-low.yml
#
# Compose file to run the dockers on the low side (virtual) machine. If you
# install data-diodes between the machines, you need to make sure that you
# have updated your local ARP table, so the machines can send UDP to each other.
# On this low-side node we run the Guacamole webapp, gmlbroker and nettest. If you have
# your own Guacamole server, you can remove it here. It is also possible to enable
# TLS on the gmlbroker, so the traffic between the Guacamole server and the gmlbroker
# is encrypted.
#
# Three ways to test:
# (1) Guacamole -> gmlbroker --> (high-side-node) --> gmguard --> gcdbroker --> guacd -> sshd/rdp
# (2) nettest   -> gmlbroker --> (high-side-node) --> gmguard --> gcdbroker --> guacd -> sshd/rdp
# (3) Your own own Guacamole server (or any other client) -> gmlbroker --> (high-side-node) --> gmguard --> gcdbroker --> guacd -> sshd/rdp
#
# Guacamole: http://localhost:8080 => login with guacadmin / guacadmin
#                                  => To test SSH and RDP, you need to add a connection in the Guacamole server:
#                                     => SSH with host sshd, user tester1, password testpass
#                                     => RDP with host rdp, user tester1, password testpass, select option "Ignore server certificate"
# nettest:   http://localhost:8081
# gmlbroker: http://localhost:4823
#
# TODO: Add configuration of SSH and RDP targets in the Guacamole webapp (or via SQL) so you can test
#
# Test the docker compose file: docker compose -f .\compose-2-node-low.yml config
# Run the docker compose file: docker compose -f .\compose-2-node-low.yml up -d --build
#
# ================================================================================

volumes:
  gm-initdb: # Guacamole webapp: postgres data (schema via guacamole-initdb.sql)

services:

  # =============================================================================
  # GMLBROKER PROXY (low-side) <=> Guacamole (low-side)
  #                             => GMGUARD PROXY (low-side)
  # =============================================================================
  gmlbroker:
    build:
      context: ../../
      dockerfile: dockers/gmlbroker/Dockerfile
    image: gmlbroker-low-side-proxy:latest
    container_name: gmlbroker
    ports:
      - "4823:4823/tcp"   # Guacamole client (or nettest) connects to this port
      - "5502:5502/udp"   # from high-side gcdbroker (D3)
    environment:
      GUAC_LISTEN_IP: 0.0.0.0
      GUAC_LISTEN_PORT: "4823"
      UDP_RECV_PORT: "5502"       # from high-side gcdbroker (D3)
      UDP_SEND_IP: gmguard        ### FILL_IN_THE_IP_ADDRESS_OF_HIGH_SIDE ### to gmguard (D1)
      UDP_SEND_PORT: "5500"

      ###########################################################################
      # TLS for the gmlbroker <-> Guacamole web server.
      # Set GMLBROKER_TLS to "1" to turn it on. gmlbroker then makes its OWN
      # self-signed cert in /tls (see the entrypoint), you do not have to
      # generate anything by hand. On the Guacamole side you have to trust that
      # cert and set guacd-ssl, see the TLS chapter in the README.
      ###########################################################################
      GMLBROKER_TLS: "false" # Set to "true" to enable TLS on the gmlbroker
                             # Note: also set GUACD_SSL on the guacamole to "true" to enable TLS on the guacamole
    volumes:
      - ./tls:/tls   # gmlbroker writes its self-signed cert here when TLS is on
    restart: unless-stopped

  # =============================================================================
  # nettest - the testing tool for the software.
  # =============================================================================
  nettest:
    build:
      context: ../../
      dockerfile: dockers/nettest/Dockerfile
    image: nettest-low-side:latest
    container_name: nettest
    depends_on: 
      - gmlbroker
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "8081:8081"
    environment:
      GML_HOST: gmlbroker         # gmlbroker shares this netns
      GML_PORT: "4823"
      HTTP_PORT: "8081"
      E2E_SSH_HOST: sshd          # guacd (high netns) dials sshd on localhost
      E2E_SSH_PORT: "22"
      E2E_SSH_USER: tester1
      E2E_SSH_PASS: testpass
    restart: unless-stopped

  # =============================================================================
  # postgress database for Guacamole.
  # =============================================================================
  guac-db:
    image: postgres:15
    container_name: guac-db
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: guacamole_pass
    volumes:
      # Schema + default admin are loaded once when the data dir is empty.
      - "gm-initdb:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # =============================================================================
  # Guacamole server (low-side) => gmlbroker (low-side)
  # This is our own image (test-guacamole), the normal guacamole 1.6.0 image
  # plus one startup step so it can trust the self-signed cert of the gmlbroker
  # when TLS is on. See dockers/test-guacamole.
  # =============================================================================
  guacamole:
    build:
      context: ../../dockers/test-guacamole
      dockerfile: Dockerfile
    image: test-guacamole-low-side:latest
    container_name: guacamole
    depends_on:
      guac-db:
        condition: service_healthy
      gmlbroker:
        condition: service_started
    ports:
      - "8080:8080"   # Guacamole web UI (8080 belongs to the low-holder receive-endpoint)
    environment:
      POSTGRESQL_HOSTNAME: guac-db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: guacamole_pass
      GUACD_HOSTNAME: gmlbroker   # gmlbroker in the low-holder netns
      GUACD_PORT: "4823"
      BAN_MAX_INVALID_ATTEMPTS: 9999

      ###########################################################################
      # TLS to the gmlbroker is OFF here (same as GMLBROKER_TLS above). If you
      # turn on GMLBROKER_TLS on the gmlbroker, also uncomment these two lines,
      # so the webapp talks TLS and trusts the gmlbroker cert in /tls.
      ###########################################################################
      GUACD_SSL: "false" # Set to "true" to enable TLS on the guacamole 
                         # NOTE: also set GMLBROKER_TLS on the gmlbroker to "true" to enable TLS on the gmlbroker
      GMLBROKER_TLS_CERT: /tls/cert.pem
    volumes:
      - "gm-initdb:/opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema:ro"
      - ./tls:/tls:ro   # reads the gmlbroker cert to build its truststore
    restart: unless-stopped

# END of Compose file