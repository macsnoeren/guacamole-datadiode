# ================================================================================
# compose-2-node-high.yml
#
# Compose file to run the dockers on the high side (virtual) machine. If you
# install data-diodes between the machines, you need to make sure that you
# have updated your local ARP table, so the machines can send UDP to each other.
# On this high-side node we run the guacd, gmguard, gcdbroker, ssh and rdp. 
#
# Test the docker compose file: docker compose -f .\compose-2-node-high.yml config
# Run the docker compose file: docker compose -f .\compose-2-node-high.yml up -d --build
#
# ================================================================================

services:

  # =============================================================================
  # GMGUARD PROXY (low-side) => GCDBROKER PROXY (high-side)
  # =============================================================================
  gmguard:
    build:
      context: ../../
      dockerfile: dockers/gmguard/Dockerfile
    image: gmguard-guard-side-proxy:latest
    container_name: gmguard
    ports:
      - "5500:5500/udp"   # from low-side gmlbroker (D1)
    environment:
      UDP_RECV_PORT: "5500"       # from low-side gmlbroker (D1)
      DST_IP: gcdbroker           # to high-side gcdbroker (D2)
      DST_PORT: "5501"
      # GUARD_APPROVE: deny       # set to 'deny' to test the denied path
    restart: unless-stopped

  # =============================================================================
  # GCDBROKER PROXY (low-side) <=> GUACD (high-side) => SSHD/RDP (high-side)
  #                             => GMLBROKER (low-side)
  # =============================================================================
  gcdbroker:
    build:
      context: ../../
      dockerfile: dockers/gcdbroker/Dockerfile
    image: gcdbroker-high-side-proxy:latest
    container_name: gcdbroker
    environment:
      GUACD_IP: guacd             # guacd shares this netns
      GUACD_PORT: "4822"
      UDP_RECV_PORT: "5501"       # from the guard-side gmguard (D2)
      UDP_SEND_IP: gmlbroker      ### FILL_IN_THE_IP_ADDRESS_OF_LOW_SIDE ### to low-side gmlbroker (D3 return)
      UDP_SEND_PORT: "5502"
    restart: unless-stopped

  # =============================================================================
  # GUACD (high-side) => SSHD/RDP (high-side)
  # This version pins the guacd image to 1.6.0.
  # =============================================================================
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    depends_on:
      - gcdbroker
    environment:
      LOG_LEVEL: debug
    restart: unless-stopped

  # =============================================================================
  # SSHD - test SSH server
  # Three users are created for testing tester1/2/3 with testpass as password.
  # =============================================================================
  sshd:
    build:
      context: ../../dockers/test-sshd
      dockerfile: Dockerfile
    image: test-sshd-high-side:latest
    container_name: sshd
    depends_on:
      - guacd
    restart: unless-stopped

  # =============================================================================
  # RDP - test RDP server
  # Three users are created for testing tester1/2/3 with testpass as password.
  # =============================================================================
  rdp:
    build:
      context: ../../dockers/test-rdp
      dockerfile: Dockerfile
    container_name: rdp
    depends_on:
      - guacd
    restart: unless-stopped

# END of Compose file