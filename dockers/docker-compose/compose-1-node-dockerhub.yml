# ================================================================================
# compose-1-node-dockerhub.yml
#
# Local TEST environment of the Guacamole data-diode software running on one
# host. When docker is installed, you can run the full software on one host
# including the Guacamole application and some test systems, so you do not
# require any hassel to setup the test environment yourself.
#
# Three ways to test:
# (1) Guacamole -> gmlbroker --> gmguard --> gcdbroker --> guacd -> sshd/rdp
# (2) nettest   -> gmlbroker --> gmguard --> gcdbroker --> guacd -> sshd/rdp
# (3) Your own own Guacamole server (or any other client) -> gmlbroker --> gmguard --> gcdbroker --> guacd -> sshd/rdp
#
# Guacamole: http://localhost:8080 => login with guacadmin / guacadmin
#                                  => To test SSH and RDP, you need to add a connection in the Guacamole server:
#                                     => SSH with host sshd, user tester1, password testpass
#                                     => RDP with host rdp, user tester1, password testpass, select option "Ignore server certificate"
# nettest:   http://localhost:8081
# gmlbroker: http://localhost:4823
#
# Test the docker compose file: docker compose -f .\compose-1-node.yml config
# Run the docker compose file: docker compose -f .\compose-1-node.yml up -d --build
#
# ================================================================================

volumes:
  gm-initdb: # Guacamole webapp: postgres data (schema via guacamole-initdb.sql)

services:

  # =============================================================================
  # GMLBROKER PROXY (low-side) <=> Guacamole (low-side)
  #                             => GMGUARD PROXY (low-side)
  # =============================================================================
  gmlbroker:
    image: macsnoeren/gmdatadiode-gmlbroker:latest
    container_name: gmlbroker
    ports:
      - "4823:4823/tcp"   # Guacamole client (or nettest) connects to this port
      - "4999:4999/udp"   # Approval forwarder - for testing only, not used in production, see script approval.py
    environment:
      GUAC_LISTEN_IP: 0.0.0.0
      GUAC_LISTEN_PORT: "4823"
      UDP_RECV_PORT: "5502"       # from high-side gcdbroker (D3)
      UDP_SEND_IP: gmguard        # to gmguard (D1)
      UDP_SEND_PORT: "5500"

      ###########################################################################
      # TLS for the gmlbroker <-> Guacamole web server.
      # Set GMLBROKER_TLS to "1" to turn it on. gmlbroker then makes its OWN
      # self-signed cert in /tls (see the entrypoint), you do not have to
      # generate anything by hand. On the Guacamole side you have to trust that
      # cert and set guacd-ssl, see the TLS chapter in the README.
      ###########################################################################
      GMLBROKER_TLS: "true" # Set to "true" to enable TLS on the gmlbroker
    volumes:
      - ./tls:/tls   # gmlbroker writes its self-signed cert here when TLS is on

    restart: unless-stopped

  # =============================================================================
  # GMGUARD PROXY (low-side) => GCDBROKER PROXY (high-side)
  # =============================================================================
  gmguard:
    image: macsnoeren/gmdatadiode-gmguard:latest
    container_name: gmguard
    environment:
      UDP_RECV_PORT: "5500"       # from low-side gmlbroker (D1)
      DST_IP: gcdbroker           # to high-side gcdbroker (D2)
      DST_PORT: "5501"
      GUARD_APPROVE: approve #deny       # set to 'deny' to test the denied path # Q: IS THIS implemented?
    restart: unless-stopped

  # =============================================================================
  # GCDBROKER PROXY (low-side) <=> GUACD (high-side) => SSHD/RDP (high-side)
  #                             => GMLBROKER (low-side)
  # =============================================================================
  gcdbroker:
    image: macsnoeren/gmdatadiode-gcdbroker:latest
    container_name: gcdbroker
    environment:
      GUACD_IP: guacd             # guacd shares this netns
      GUACD_PORT: "4822"
      UDP_RECV_PORT: "5501"       # from the guard-side gmguard (D2)
      UDP_SEND_IP: gmlbroker      # to low-side gmlbroker (D3 return)
      UDP_SEND_PORT: "5502"
    restart: unless-stopped

  # =============================================================================
  # GUACD (high-side) => SSHD/RDP (high-side)
  # This version pins the guacd image to 1.6.0.
  # =============================================================================
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacd
    depends_on:
      - gcdbroker
    environment:
      LOG_LEVEL: debug
    restart: unless-stopped

  # =============================================================================
  # SSHD - test SSH server
  # Three users are created for testing tester1/2/3 with testpass as password.
  # =============================================================================
  sshd:
    build:
      context: ../../dockers/test-sshd
      dockerfile: Dockerfile
    image: test-sshd-high-side:latest
    container_name: sshd
    depends_on:
      - guacd
    restart: unless-stopped

  # =============================================================================
  # RDP - test RDP server
  # Three users are created for testing tester1/2/3 with testpass as password.
  # =============================================================================
  rdp:
    build:
      context: ../../dockers/test-rdp
      dockerfile: Dockerfile
    container_name: rdp
    depends_on:
      - guacd
    restart: unless-stopped

  # =============================================================================
  # nettest - the testing tool for the software.
  # =============================================================================
  nettest:
    image: macsnoeren/gmdatadiode-nettest:latest
    container_name: nettest
    depends_on: 
      - gmlbroker
      - gmguard
      - gcdbroker
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    ports:
      - "8081:8081"
    environment:
      GML_HOST: gmlbroker         # gmlbroker shares this netns
      GML_PORT: "4823"
      HTTP_PORT: "8081"
      E2E_SSH_HOST: sshd     # guacd (high netns) dials sshd on localhost
      E2E_SSH_PORT: "22"
      E2E_SSH_USER: tester1
      E2E_SSH_PASS: testpass
    restart: unless-stopped

  # =============================================================================
  # postgress database for Guacamole.
  # =============================================================================
  guac-db:
    image: postgres:15
    container_name: guac-db
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: guacamole_pass
    volumes:
      # Schema + default admin are loaded once when the data dir is empty.
      - "gm-initdb:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole_user -d guacamole_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # =============================================================================
  # Guacamole server (low-side) => gmlbroker (low-side)
  # This is our own image (test-guacamole), which is the normal guacamole 1.6.0
  # image plus one startup step so it can trust the self-signed cert of the
  # gmlbroker when TLS is on. See dockers/test-guacamole.
  # =============================================================================
  guacamole:
    build:
      context: ../../dockers/test-guacamole
      dockerfile: Dockerfile
    image: test-guacamole-low-side:latest
    container_name: guacamole
    depends_on:
      guac-db:
        condition: service_healthy
      gmlbroker:
        condition: service_started
    ports:
      - "8080:8080"   # Guacamole web UI (8080 belongs to the low-holder receive-endpoint)
    environment:
      POSTGRESQL_HOSTNAME: guac-db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USERNAME: guacamole_user
      POSTGRESQL_PASSWORD: guacamole_pass
      GUACD_HOSTNAME: gmlbroker   # gmlbroker in the low-holder netns
      GUACD_PORT: "4823"
      BAN_MAX_INVALID_ATTEMPTS: 9999

      ###########################################################################
      # TLS to the gmlbroker. Keep this in sync with GMLBROKER_TLS on gmlbroker:
      # both on together, or both off together. GUACD_SSL makes the webapp talk
      # TLS, GMLBROKER_TLS_CERT tells our image which cert to trust (the one
      # gmlbroker wrote in /tls). If you turn TLS off, remove these two again.
      ###########################################################################
      GUACD_SSL: "true"
      GMLBROKER_TLS_CERT: /tls/cert.pem
    volumes:
      - "gm-initdb:/opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema:ro"
      - ./tls:/tls:ro   # reads the gmlbroker cert to build its truststore
    restart: unless-stopped

# END of Compose file