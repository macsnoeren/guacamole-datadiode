# Shared TLS overlay for the gmlbroker <-> Guacamole web server leg.
#
# The plain topology composes run that leg in plaintext (the PoC default);
# layering this file enables encryption on the link that becomes a real network
# hop once the web server lives off the low-side node. It applies to any
# topology where gmwebserver and gmlbroker are co-located (1node, 3node low node,
# 5node low-tx node).
#
# Generate the certs once for the topology, then layer this file ON TOP of that
# topology's compose, e.g.:
#
#   ./docker/1node/generate-tls.sh
#   docker compose -f docker/1node/compose.yml -f docker/include/tls/compose.yml up --build
#
# The ./tls bind path below resolves against the *project directory* — the
# directory of the FIRST -f file (the topology compose) — so it points at that
# topology's own tls/ dir, e.g. docker/1node/tls, not this file's location. Each
# topology's generate-tls.sh writes there.
#
# Both ends are flipped together: GMLBROKER_TLS arms gmlbroker's TLS server,
# GUACD_SSL tells the web app to dial it over TLS, and the mounted truststore.jks
# lets the web app's JVM trust gmlbroker's self-signed certificate (Guacamole
# validates the chain, not the hostname).
services:
  gmlbroker:
    environment:
      GMLBROKER_TLS: "1"
      GMLBROKER_TLS_CERT: /tls/cert.pem
      GMLBROKER_TLS_KEY: /tls/key.pem
    volumes:
      - ./tls:/tls:ro

  guacamole:
    environment:
      GUACD_SSL: "true"
      JAVA_OPTS: "-Djavax.net.ssl.trustStore=/tls/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
    volumes:
      - ./tls:/tls:ro
