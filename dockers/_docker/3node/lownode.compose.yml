name: 3dd-3node-lownode

include:
  - ../include/gmwebserver/compose.yml
  - ../include/gmlbroker/compose.yml
  - ../include/approver/compose.yml
  - ../include/nettest/compose.yml

services:
  gmlbroker:
    command:
      [
        "./build/gmlbroker",
        "gmlbroker", "4823",
        "5502",
        "10.0.0.2", "5500"
      ]
    ports:
      - "5502:5502/udp"

  approver:
    # Low-side approver: reaches the isolated guard only through gmlbroker's relay
    # (gmlbroker forwards the toggle to the guard at 10.0.0.2:4999, the diode-
    # allowed direction).
    environment:
      GUARD_HOST: gmlbroker

  nettest:
    volumes:
      - ./nettest-reports:/var/log/nettest
